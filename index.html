<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML page</title>
</head>
<body>
    <h1>HTML Page</h1>
   <p>This is an example of an <s>HTML4</s> <ins>HTML5</ins> form containing يحتوي <mark>input</mark> controls:</p>
    <form method="post">
    <fieldset>
        <legend>User Information</legend>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>
    </fieldset>
     <fieldset>
        <legend>Contact Information</legend>
        <label for="number">Phone:</label>
        <input type="tel" id="number" name="number" required><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50"></textarea><br>
    </fieldset>
     <fieldset>
        <legend>Subscription</legend>
        <label for="subscribe">Subscribe to our newsletter:</label>
        <input type="checkbox" id="subscribe" name="subscribe"><br><br>
        <label for="subscribe2">Subscribe to our newsletter:</label>
        <input type="checkbox" id="subscribe2" name="subscribe2">
    </fieldset>
    <fieldset>
        <legend>Preferred Language</legend>
        <label for="language">Select your preferred language:</label>
        <select id="language" name="language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
        </select>
    </fieldset>
     <fieldset>
        <legend>Feedback</legend>
        <label for="feedback">Rate our service:</label>
        <input type="range" id="feedback" name="feedback" min="0" max="10" step="1" value="5">
    </fieldset>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</form>
</body>
</html>
